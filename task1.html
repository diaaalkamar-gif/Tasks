<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diversity & inclusion Tranining</title>
</head>

<body>
    <h1>Diversity & inclusion Tranining</h1>
    <hr>
    <form action="" method="post" autocomplete="on">

        <label for="name">Name</label>
        <input type="text" name="name" id="name" required>
        <br><br>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
        <br><br>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
        <br><br>

        <label for="tel">Tel</label>
        <input type="tel" name="tel" id="tel" pattern="[0-9]{8,15}" required>
        <br><br>

        <label for="org">Organization or company</label>
        <br>
        <textarea name="org" id="org" placeholder="please enter your organization" rows="3" cols="40"></textarea>
        <br><br>

        <h2>Registration type</h2>

        <input type="checkbox" name="regtype" value="business" id="business">
        <label for="business">Business</label>
        <br>

        <input type="checkbox" name="regtype" value="educator" id="educator">
        <label for="educator">Educator</label>
        <br>

        <input type="checkbox" name="regtype" value="parent" id="parent">
        <label for="parent">Parent</label>
        <br>

        <input type="checkbox" name="regtype" value="student" id="student">
        <label for="student">Student</label>
        <br>

        <input type="checkbox" name="regtype" value="other" id="other">
        <label for="other">Other</label>
        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
